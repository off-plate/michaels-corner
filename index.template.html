<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0e0e10" />
<title>Michael's Corner</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23e7c66b'/%3E%3Ctext x='50' y='70' font-size='60' font-family='-apple-system,sans-serif' font-weight='700' text-anchor='middle' fill='%230e0e10'%3EMC%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e10;
    --panel: #16161a;
    --panel-2: #1d1d22;
    --border: #232328;
    --border-2: #2e2e35;
    --fg: #f3f3f0;
    --muted: #8a8a85;
    --muted-2: #6a6a65;
    --accent: #e7c66b;
    --accent-ink: #1a1a14;
    --accent-soft: rgba(231, 198, 107, 0.12);
    --red: #e26d5c;
    --green: #6ec27a;
    --blue: #7aa8d8;
    --radius: 12px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  button, input, textarea, select {
    font: inherit;
    color: inherit;
    background: transparent;
    border: 0;
  }
  textarea { resize: vertical; }
  a { color: var(--accent); text-decoration: none; }

  /* App layout */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
  }

  /* Sidebar */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 8px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: var(--accent);
    color: var(--accent-ink);
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 13px;
  }
  .brand-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-group-label {
    color: var(--muted-2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    padding: 16px 10px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.12s;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover {
    background: var(--panel-2);
    color: var(--fg);
  }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }

  /* Mobile bottom-bar nav */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index: 20;
    justify-content: space-around;
  }
  .mobile-nav button {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 4px;
    color: var(--muted-2);
    font-size: 10px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
  }
  .mobile-nav button.active { color: var(--accent); }
  .mobile-nav .nav-icon { font-size: 18px; width: auto; }
  @media (max-width: 820px) {
    .sidebar { display: none; }
    .mobile-nav { display: flex; }
    .main { padding-bottom: 80px; }
    .mobile-header { display: flex; }
  }

  /* Mobile top header */
  .mobile-header {
    display: none;
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 14px 20px;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  /* Main */
  .main { min-width: 0; }
  .page {
    padding: 32px 36px 64px;
    max-width: 920px;
  }
  @media (max-width: 820px) { .page { padding: 20px 18px 40px; } }

  .page-head {
    margin-bottom: 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }
  .page-title {
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .page-sub { color: var(--muted); margin: 4px 0 0; font-size: 14px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    border-radius: 8px;
    background: var(--panel-2);
    color: var(--fg);
    border: 1px solid var(--border);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn:hover { border-color: var(--border-2); background: var(--panel); }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--muted);
    padding: 6px 10px;
  }
  .btn-ghost:hover { color: var(--fg); background: var(--panel-2); }
  .btn-danger { color: var(--red); }
  .btn-sm { padding: 6px 10px; font-size: 13px; }

  /* Cards */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card + .card { margin-top: 14px; }
  .card h3 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* Inputs */
  .input, .textarea, .select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--fg);
    font-size: 14px;
    transition: border-color 0.12s;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .textarea { min-height: 80px; line-height: 1.5; }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Pills / badges */
  .pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: var(--panel-2);
    color: var(--muted);
    border: 1px solid var(--border);
    text-transform: uppercase;
  }
  .pill-accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
  .pill-green { background: rgba(110, 194, 122, 0.14); color: var(--green); border-color: transparent; }
  .pill-blue { background: rgba(122, 168, 216, 0.14); color: var(--blue); border-color: transparent; }
  .pill-red { background: rgba(226, 109, 92, 0.14); color: var(--red); border-color: transparent; }

  /* List rows */
  .row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .row + .row { margin-top: 8px; }
  .row:hover { border-color: var(--border-2); }
  .row .label { flex: 1; min-width: 0; }
  .row .label .title { font-weight: 500; color: var(--fg); }
  .row .label .meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .row .actions { display: flex; gap: 4px; }

  /* Checklist */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .check-item:last-child { border-bottom: 0; }
  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border-2);
    flex-shrink: 0;
    margin-top: 1px;
    display: grid;
    place-items: center;
    transition: all 0.12s;
  }
  .check-item.done .check-box {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-ink);
  }
  .check-item.done .check-box::after {
    content: '✓';
    font-size: 13px;
    font-weight: 700;
  }
  .check-item.done .check-text { color: var(--muted); text-decoration: line-through; }
  .check-text { line-height: 1.45; font-size: 14px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 56px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty h3 { margin: 0 0 6px; font-weight: 600; color: var(--fg); }

  /* Status board */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  @media (max-width: 820px) { .board { grid-template-columns: 1fr; } }
  .board-col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    min-height: 120px;
  }
  .board-col-head {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .board-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .board-card:hover { border-color: var(--border-2); }
  .board-card .title { font-weight: 500; }
  .board-card .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Reference page styling */
  .ref-grid { display: grid; gap: 12px; }
  @media (min-width: 720px) { .ref-grid-2 { grid-template-columns: 1fr 1fr; } }
  .ref-table { width: 100%; font-size: 14px; }
  .ref-table td { padding: 5px 0; vertical-align: top; }
  .ref-table td:first-child { color: var(--muted); width: 45%; padding-right: 10px; }
  pre.diagram {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    margin: 0;
  }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: grid;
    place-items: center;
    z-index: 50;
    padding: 20px;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 18px; font-weight: 600; margin: 0; }

  /* Utilities */
  .row-h { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .gap-8 { gap: 8px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .text-muted { color: var(--muted); }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 12px; }
  .grow { flex: 1; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="root">
    <div style="display:grid;place-items:center;min-height:100vh;color:var(--muted)">Loading…</div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
/* __INLINE_APP__ */
</script>
</body>
</html>
